<section class="callback-page">
  <article class="callback-card">
    @if (isLoading) {
      <div class="spinner" aria-hidden="true"></div>
      <h1>Signing you in...</h1>
      <p>Please wait while we complete Google authentication.</p>
    }

    @if (!isLoading) {
      <h1>Sign-in failed</h1>
      <p>{{ errorMessage }}</p>
      <a [routerLink]="['/']">Back to login</a>
    }
  </article>
</section>
