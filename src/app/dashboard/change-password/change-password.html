<section class="password-card">
	<h1>Change Password</h1>
	<p class="subtitle">Use a strong password with at least 8 characters, numbers, and symbols.</p>

	<form>
		<label>
			<span>Current password</span>
			<input type="password" />
		</label>

		<label>
			<span>New password</span>
			<input type="password" />
		</label>

		<label>
			<span>Confirm new password</span>
			<input type="password" />
		</label>

		<button type="button">Update password</button>
	</form>
</section>
