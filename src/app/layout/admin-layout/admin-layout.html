<div class="admin-shell">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <div class="brand-mark">Admin Portal</div>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/admin/overview" routerLinkActive="active" class="nav-item">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </span> Overview &amp; Analytics
      </a>
      <a routerLink="/admin/users" routerLinkActive="active" class="nav-item">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span> Users &amp; Access
      </a>
      <a routerLink="/admin/templates" routerLinkActive="active" class="nav-item">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
        </span> Template Manager
      </a>
      <a routerLink="/admin/ai-stats" routerLinkActive="active" class="nav-item">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
        </span> AI Usage Stats
      </a>
      <a routerLink="/admin/broadcast" routerLinkActive="active" class="nav-item">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/></svg>
        </span> Broadcast
      </a>
      <a routerLink="/admin/audit" routerLinkActive="active" class="nav-item">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </span> Audit Logs
      </a>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="admin-main">
    <header class="admin-topbar">
      <div class="topbar-search">
        <input type="text" placeholder="Search system logs or users..." class="search-input">
      </div>
      <div class="topbar-actions">
        <!-- Theme Toggle -->
        <button class="theme-toggle-btn" (click)="themeService.toggleTheme()" aria-label="Toggle theme">
          <svg *ngIf="themeService.currentTheme() === 'dark'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2m-8-8H2M22 12h-2m-2.64-5.36-1.42 1.42M6.06 17.94l-1.42 1.42M17.94 17.94l1.42 1.42M6.06 6.06 4.64 4.64"/>
          </svg>
          <svg *ngIf="themeService.currentTheme() === 'light'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
          </svg>
        </button>

        <div class="admin-profile">
          <span class="admin-email">{{ adminEmail }}</span>
          <button class="logout-btn" (click)="logout()">Sign Out</button>
        </div>
      </div>
    </header>

    <div class="admin-content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
